<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Range</title>
    <script>
      (function () {
        const KEY = "range-theme";
        const root = document.documentElement;
        let saved;
        try {
          saved = localStorage.getItem(KEY);
        } catch (_) {
          /* ignore */
        }
        const sys = matchMedia("(prefers-color-scheme: light)").matches
          ? "light"
          : "dark";
        root.setAttribute("data-theme", saved || sys);
        addEventListener("click", function (e) {
          const target = e.target instanceof Element ? e.target : null;
          const btn = target?.closest("[data-theme-toggle]");
          if (!btn) return;
          const next =
            root.getAttribute("data-theme") === "light" ? "dark" : "light";
          root.setAttribute("data-theme", next);
          try {
            localStorage.setItem(KEY, next);
          } catch (_) {
            /* ignore */
          }
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Geist:wght@300..700&family=JetBrains+Mono:wght@400..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
